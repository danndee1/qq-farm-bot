# 当上游仓库更新时，自动拉取、构建并推送 Docker 镜像
# 使用前请先 Fork https://github.com/wjnnone/qq-farm-bot 到你的 GitHub 账号

name: Build and Push Docker Image

on:
  # 每天 UTC 0:00（北京时间 8:00）检查上游更新
  schedule:
    - cron: '0 0 * * *'
  # 支持手动触发
  workflow_dispatch:
  # 当你向本仓库 push 时也触发（例如手动同步上游后）
  push:
    branches: [main, master]

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch upstream changes
        id: fetch
        run: |
          git remote add upstream https://github.com/wjnnone/qq-farm-bot.git 2>/dev/null || true
          git fetch upstream main
          UPSTREAM_COMMIT=$(git rev-parse upstream/main)
          LOCAL_COMMIT=$(git rev-parse HEAD)
          echo "upstream=$UPSTREAM_COMMIT" >> $GITHUB_OUTPUT
          echo "local=$LOCAL_COMMIT" >> $GITHUB_OUTPUT
          if [ "$UPSTREAM_COMMIT" = "$LOCAL_COMMIT" ]; then
            echo "has_updates=false" >> $GITHUB_OUTPUT
          else
            echo "has_updates=true" >> $GITHUB_OUTPUT
          fi

      # 仅当检测到上游有更新，或手动触发/本仓库 push 时继续构建
      - name: Merge upstream (if updates exist)
        if: steps.fetch.outputs.has_updates == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git merge upstream/main --no-edit || true

      - name: Push merged changes (keep fork in sync)
        if: steps.fetch.outputs.has_updates == 'true' && github.event_name == 'schedule'
        run: git push origin HEAD

      # 仅在有更新、手动触发或本仓库 push 时构建
      - name: Set up Docker Buildx
        if: steps.fetch.outputs.has_updates == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: steps.fetch.outputs.has_updates == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        if: steps.fetch.outputs.has_updates == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=true

      - name: Build and push
        if: steps.fetch.outputs.has_updates == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./core/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
